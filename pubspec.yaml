name: guia_turistica
description: Guía turística de Colombia

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_maps_flutter: ^2.5.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.0
  equatable: ^2.0.5
  geolocator: ^10.1.0
  image_picker: ^1.0.5       
  path_provider: ^2.1.1      
  hive_flutter: ^1.1.0       
  uuid: ^4.2.1               
  permission_handler: ^11.0.0 

flutter:
  uses-material-design: true
  assets:
    - assets/data/places.json